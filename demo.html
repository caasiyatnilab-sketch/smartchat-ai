<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartChat AI — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui;background:#fff;color:#1a1a1a;height:100vh;display:flex;flex-direction:column}
    .bar{padding:.75rem 1rem;background:#fafafa;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid #eee}
    .bar a{color:#666;text-decoration:none;font-size:1rem}
    .bar .dot{width:32px;height:32px;background:#6366f1;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.8rem}
    .bar .name{font-weight:600;font-size:.9rem}
    .bar .status{color:#22c55e;font-size:.75rem}
    .msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
    .m{max-width:75%;padding:.6rem .9rem;border-radius:12px;font-size:.9rem;line-height:1.5}
    .m.bot{align-self:flex-start;background:#f3f4f6;border-bottom-left-radius:4px}
    .m.me{align-self:flex-end;background:#6366f1;color:#fff;border-bottom-right-radius:4px}
    .m .t{font-size:.65rem;color:#999;margin-top:.15rem}
    .m.me .t{color:rgba(255,255,255,.6)}
    .dots{align-self:flex-start;background:#f3f4f6;padding:.5rem .8rem;border-radius:12px;border-bottom-left-radius:4px;display:none}
    .dots span{display:inline-block;width:6px;height:6px;background:#999;border-radius:50%;margin:0 1.5px;animation:d 1.4s infinite}
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes d{0%,100%{opacity:.2}50%{opacity:1}}
    .inp{padding:.75rem;background:#fafafa;display:flex;gap:.5rem;border-top:1px solid #eee}
    .inp input{flex:1;padding:.6rem .8rem;border:1px solid #ddd;border-radius:8px;font-size:.9rem;font-family:inherit}
    .inp input:focus{outline:none;border-color:#6366f1}
    .inp button{width:36px;height:36px;background:#6366f1;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:1rem}
    footer{padding:.75rem;text-align:center;color:#999;font-size:.75rem;border-top:1px solid #eee}
    @media(max-width:500px){.m{max-width:90%}}
  </style>
</head>
<body>
  <div class="bar">
    <a href="index.html">&larr;</a>
    <div class="dot">S</div>
    <div><div class="name">SmartChat AI</div><div class="status">Online</div></div>
  </div>
  <div class="msgs" id="msgs">
    <div class="m bot">Hi! How can I help you today?<div class="t">Just now</div></div>
  </div>
  <div class="dots" id="dots"><span></span><span></span><span></span></div>
  <div class="inp">
    <input id="i" placeholder="Type a message..." onkeydown="if(event.key==='Enter')go()">
    <button onclick="go()">&#8593;</button>
  </div>
  <footer>SmartChat AI | 2026</footer>
  <script>
    let vid=localStorage.getItem('v')||crypto.randomUUID();localStorage.setItem('v',vid);
    function t(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
    function add(txt,u){const d=document.createElement('div');d.className='m '+(u?'me':'bot');d.innerHTML=txt+'<div class="t">'+t()+'</div>';document.getElementById('msgs').appendChild(d);document.getElementById('msgs').scrollTop=9e4}
    async function go(){const i=document.getElementById('i'),v=i.value.trim();if(!v)return;add(v,1);i.value='';document.getElementById('dots').style.display='block';document.getElementById('msgs').scrollTop=9e4;try{const r=await fetch('/api/chatbots/demo/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:v,visitor_id:vid})});const d=await r.json();document.getElementById('dots').style.display='none';add(d.response||'Sorry, something went wrong.',0)}catch(e){document.getElementById('dots').style.display='none';add('Could not connect.',0)}}
  </script>
</body>
</html>
