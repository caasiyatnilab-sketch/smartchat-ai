<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartChat AI - Customer Support Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .chat-messages { max-height: 400px; overflow-y: auto; }
    .typing { display: inline-block; }
    .typing span {
      animation: blink 1.4s infinite both;
      font-size: 20px;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0% { opacity: 0.2; }
      20% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl">🤖</span>
        <span class="font-bold text-xl text-blue-600">SmartChat AI</span>
      </div>
    </div>
  </header>

  <section class="bg-white py-16">
    <div class="max-w-4xl mx-auto px-4 text-center">
      <h1 class="text-4xl font-bold text-gray-900 mb-4">AI Customer Support Chatbot</h1>
      <p class="text-lg text-gray-600 mb-8">Engage visitors 24/7 with AI-powered chat. Try the demo below!</p>
    </div>
  </section>

  <section class="py-12 bg-gray-50">
    <div class="max-w-md mx-auto px-4">
      <h2 class="text-2xl font-bold text-center mb-6">Try Demo Chatbot</h2>
      <div class="bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 text-white p-4 flex items-center gap-3">
          <span class="text-2xl">🤖</span>
          <div>
            <p class="font-medium">Demo Bot</p>
            <p class="text-xs text-blue-200">AI Assistant</p>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages p-4 space-y-3 h-80">
          <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
            <p class="text-sm">Hello! I'm SmartChat AI. How can I help you today?</p>
          </div>
        </div>
        <div class="border-t p-4 flex gap-2">
          <input type="text" id="chatInput" placeholder="Type your message..." class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-600">
          <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Send</button>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-gray-900 text-white py-8 text-center">
    <p>© 2024 SmartChat AI</p>
  </footer>

  <script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');

    const responses = {
      'hello': "Hi there! How can I help you today?",
      'hi': "Hello! What can I assist you with?",
      'help': "I can help you with: product info, pricing, support, or general questions.",
      'price': "We have plans starting at $0/month! Free plan includes 1 chatbot with 50 conversations.",
      'product': "SmartChat AI is a chatbot platform that helps businesses engage customers 24/7.",
      'support': "For support, email us at support@smartchat.ai",
      'bye': "Goodbye! Feel free to come back anytime! 👋",
      'thanks': "You're welcome! Anything else?"
    };

    function getResponse(message) {
      const lower = message.toLowerCase();
      for (const [key, value] of Object.entries(responses)) {
        if (lower.includes(key)) return value;
      }
      return "Thanks for your message! This is a demo. Sign up to create your own AI chatbot!";
    }

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = isUser ? 'bg-blue-600 text-white rounded-lg p-3 max-w-[80%] ml-auto' : 'bg-gray-100 rounded-lg p-3 max-w-[80%]';
      div.innerHTML = `<p class="text-sm">${text}</p>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendMessage() {
      const message = chatInput.value.trim();
      if (!message) return;
      addMessage(message, true);
      chatInput.value = '';
      const typing = document.createElement('div');
      typing.className = 'bg-gray-100 rounded-lg p-3 max-w-[80%]';
      typing.innerHTML = '<span class="typing"><span>•</span><span>•</span><span>•</span></span>';
      chatMessages.appendChild(typing);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      setTimeout(() => {
        chatMessages.removeChild(typing);
        addMessage(getResponse(message), false);
      }, 1000);
    }
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
