<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SmartChat AI</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#030712;color:#f9fafb;min-height:100vh;display:flex;flex-direction:column}.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}.landing h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;margin-bottom:1rem}.hl{background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.landing p{color:#9ca3af;max-width:500px;margin-bottom:2rem;font-size:1.1rem}.start-btn{padding:1rem 2.5rem;background:linear-gradient(135deg,#6366f1,#06b6d4);color:#fff;border:none;border-radius:50px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:.3s}.start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(99,102,241,.3)}.chat{display:none;flex:1;flex-direction:column;max-width:600px;margin:0 auto;width:100%;height:100vh}.chat-header{padding:1rem 1.5rem;background:#0f172a;display:flex;align-items:center;gap:1rem;border-bottom:1px solid rgba(99,102,241,.1)}.avatar{width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#06b6d4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem}.info h3{font-size:.95rem}.info p{color:#22c55e;font-size:.8rem}.back{background:none;border:none;color:#9ca3af;font-size:1.2rem;cursor:pointer;margin-right:.5rem}.messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:.8rem}.msg{max-width:80%;padding:.8rem 1rem;border-radius:16px;line-height:1.5;font-size:.95rem}.msg.bot{align-self:flex-start;background:#1e293b;border-bottom-left-radius:4px}.msg.user{align-self:flex-end;background:linear-gradient(135deg,#6366f1,#06b6d4);border-bottom-right-radius:4px}.msg .time{font-size:.7rem;color:#64748b;margin-top:.3rem}.msg.user .time{color:rgba(255,255,255,.5)}.typing{align-self:flex-start;background:#1e293b;padding:.8rem 1.2rem;border-radius:16px;border-bottom-left-radius:4px;display:none}.typing span{display:inline-block;width:8px;height:8px;background:#6366f1;border-radius:50%;margin:0 2px;animation:dot 1.4s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}@keyframes dot{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}.input-area{padding:1rem;background:#0f172a;display:flex;gap:.5rem;border-top:1px solid rgba(99,102,241,.1)}input{flex:1;padding:.8rem 1rem;background:#1e293b;border:1px solid rgba(99,102,241,.15);border-radius:12px;color:#f9fafb;font-size:.95rem}input:focus{outline:none;border-color:#6366f1}input::placeholder{color:#64748b}.send-btn{width:44px;height:44px;background:linear-gradient(135deg,#6366f1,#06b6d4);border:none;border-radius:12px;color:#fff;font-size:1.1rem;cursor:pointer;transition:.3s}.send-btn:hover{transform:scale(1.05)}footer{text-align:center;padding:1.5rem;background:#020617;color:#6b7280;font-size:.85rem}footer span{color:#06b6d4}@media(max-width:600px){.msg{max-width:90%}}</style></head><body><div class="landing" id="landing"><div style="font-size:3rem;margin-bottom:1rem">🤖</div><h1>Hi! Im <span class="hl">SmartChat AI</span></h1><p>Your AI-powered customer support assistant. Ask me anything.</p><button class="start-btn" onclick="startChat()">Start Chatting →</button></div><div class="chat" id="chat"><div class="chat-header"><button class="back" onclick="goBack()">←</button><div class="avatar">🤖</div><div class="info"><h3>SmartChat AI</h3><p>● Online</p></div></div><div class="messages" id="messages"><div class="msg bot">Hi! 👋 Im SmartChat AI. How can I help you today?<div class="time">Just now</div></div></div><div class="typing" id="typing"><span></span><span></span><span></span></div><div class="input-area"><input id="input" placeholder="Type your message..." onkeydown="if(event.key===String.fromCharCode(13))send()"><button class="send-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button></div></div><footer>Built with ❤️ | SmartChat AI | © <span>2026</span></footer><script>const API=location.origin;let vid=localStorage.getItem('vid')||crypto.randomUUID();localStorage.setItem('vid',vid);function startChat(){document.getElementById('landing').style.display='none';document.getElementById('chat').style.display='flex';document.getElementById('input').focus()}function goBack(){document.getElementById('chat').style.display='none';document.getElementById('landing').style.display='flex'}function addMsg(t,u){const d=document.createElement('div');d.className='msg '+(u?'user':'bot');d.innerHTML=t+'<div class="time">'+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div>';document.getElementById('messages').appendChild(d);document.getElementById('messages').scrollTop=99999}async function send(){const i=document.getElementById('input'),t=i.value.trim();if(!t)return;addMsg(t,true);i.value='';document.getElementById('typing').style.display='block';document.getElementById('messages').scrollTop=99999;try{const r=await fetch(API+'/api/chatbots/demo/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,visitor_id:vid})});const d=await r.json();document.getElementById('typing').style.display='none';addMsg(d.response||d.error||'Sorry, something went wrong.',false)}catch(e){document.getElementById('typing').style.display='none';addMsg('Sorry, could not connect.',false)}}</script></body></html>
